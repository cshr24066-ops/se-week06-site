<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --main: #2563eb;
      --text: #1f2937;
      --sub: #6b7280;
      --border: #dbe3ee;
    }

    body {
      font-family: sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    header {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      padding: 72px 20px 56px;
      text-align: center;
    }

    header h1 {
      font-size: 2.4rem;
      margin-bottom: 12px;
    }

    header p {
      font-size: 1rem;
      opacity: 0.95;
    }

    nav {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    nav ul {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      list-style: none;
    }

    nav li {
      margin: 0;
    }

    nav a {
      display: block;
      padding: 14px 18px;
      color: var(--text);
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    nav a:hover {
      color: var(--main);
      background: #eef4ff;
    }

    main {
      width: min(1000px, 92%);
      margin: 40px auto;
    }

    section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px 24px;
      margin-bottom: 28px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
      opacity: 0;
      transform: translateY(30px);
      transition: 0.7s ease;
    }

    section.show {
      opacity: 1;
      transform: translateY(0);
    }

    h2 {
      font-size: 1.7rem;
      margin-bottom: 18px;
      color: var(--main);
    }

    .about-text {
      color: var(--sub);
    }

    .skills-grid,
    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .skill-card,
    .work-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      background: #fafcff;
      transition: 0.25s;
    }

    .skill-card:hover,
    .work-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    .skill-card h3,
    .work-card h3 {
      margin-bottom: 10px;
      font-size: 1.1rem;
    }

    .tag {
      display: inline-block;
      margin-top: 10px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .reflection-box {
      background: #f8fbff;
      border-left: 5px solid var(--main);
      padding: 18px;
      border-radius: 10px;
      color: var(--sub);
    }

    footer {
      text-align: center;
      color: var(--sub);
      padding: 30px 20px 50px;
      font-size: 0.9rem;
    }

    .top-button {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      background: var(--main);
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 5px 16px rgba(0,0,0,0.2);
      display: none;
    }

    .top-button.show {
      display: block;
    }

    @media (max-width: 600px) {
      header {
        padding: 60px 16px 46px;
      }

      header h1 {
        font-size: 2rem;
      }

      section {
        padding: 24px 18px;
      }

      h2 {
        font-size: 1.45rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>自己紹介サイト</h1>
    <p>_(:3」∠)_</p>
  </header>

  <nav>
    <ul>
      <li><a href="#about">About</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#works">Works</a></li>
    </ul>
  </nav>

  <main>

    <section id="about">
      <h2>About</h2>
      <p class="about-text">
        情報系分野を学習しているものです.<br>
        組み込み分野やデータサイエンス分野に興味があります．<br>
      </p>
    </section>

    <section id="skills">
      <h2>Skills</h2>

      <div class="skills-grid">

        <div class="skill-card">
          <h3>C言語</h3>
          <p>
            基本文法，配列，ポインタ，
            ファイル操作などを学習済み．
          </p>
          <span class="tag">Programming</span>
        </div>

         <div class="skill-card">
          <h3>Java</h3>
          <p>
            オブジェクト指向の基本的な考えを学習済み．
          </p>
          <span class="tag">Programming</span>
        </div>

      </div>
    </section>

    <section id="works">
      <h2>Works</h2>

      <div class="works-grid">

        <div class="work-card">
          <h3>学習用</h3>
          <p>
            今は何も学習していません．
          </p>
        </div>

      </div>
    </section>
  </main>

  <footer>
    © 2026 Portfolio Sample
  </footer>

  <button class="top-button" id="topBtn">↑</button>

  <script>
    const sections = document.querySelectorAll("section");

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("show");
        }
      });
    }, {
      threshold: 0.15
    });

    sections.forEach(section => {
      observer.observe(section);
    });

    const topBtn = document.getElementById("topBtn");

    window.addEventListener("scroll", () => {
      if (window.scrollY > 300) {
        topBtn.classList.add("show");
      } else {
        topBtn.classList.remove("show");
      }
    });

    topBtn.addEventListener("click", () => {
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    });
  </script>

</body>
</html>
